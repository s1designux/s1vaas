spring:
  application:
    name: s1vaas-backend
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:s1vaas}
    username: ${DB_USER:s1vaas}
    password: ${DB_PASS:s1vaas}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.default_schema: s1vaas
      hibernate.jdbc.time_zone: Asia/Seoul
      hibernate.format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    schemas: [s1vaas]
    default-schema: s1vaas
    create-schemas: true
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,flyway
  endpoint:
    health:
      show-details: always

logging:
  level:
    kr.s1.vaas: INFO
    org.flywaydb: INFO
    org.hibernate.SQL: DEBUG
